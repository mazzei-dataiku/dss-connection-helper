<div class="add-snowflake-variables">
  <div class="alert alert-error" ng-if="setup.error">
    <strong>Setup error:</strong> {{setup.error}}
  </div>

  <p class="muted">This macro builds a table from your visible Snowflake connections. Edit the values, then run the macro.</p>

  <label class="checkbox">
    <input type="checkbox" ng-model="ui.loadUser" ng-change="ui.onToggleLoadUser()" />
    Load user's variables
  </label>
  <label class="checkbox" style="margin-left: 16px">
    <input type="checkbox" ng-model="ui.saveUser" />
    Save back to user's variables
  </label>

  <div style="margin-top: 12px">
    <label>Variable prefix</label>
    <input type="text" ng-model="ui.prefix" style="width: 240px" />
  </div>

  <h4 style="margin-top: 16px">Variables</h4>
  <table class="table" ng-if="!setup.error">
    <thead>
      <tr>
        <th>Connection</th>
        <th>Key</th>
        <th>Project variable</th>
        <th>Value</th>
      </tr>
    </thead>
    <tbody>
      <tr ng-repeat="row in ui.rows track by $index">
        <td>{{row.connection}}</td>
        <td>{{row.key}}</td>
        <td>
          <input type="text" ng-model="row.variable_name" ng-change="ui.syncSelectionJson()" />
        </td>
        <td>
          <input type="text" ng-model="row.value" ng-change="ui.syncSelectionJson()" />
        </td>
      </tr>
    </tbody>
  </table>

  <div class="muted" ng-if="!setup.error && (!ui.rows || ui.rows.length === 0)">
    No Snowflake variables found for your visible connections.
  </div>

  <!-- Hidden field that the runnable consumes -->
  <textarea style="display:none" ng-model="config.selection_json"></textarea>
</div>
